spring.application.name=P2_Rev_Workforce
server.port=8081

# Oracle DB Configuration
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=system
spring.datasource.password=root
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# Suppress open-in-view warning (keep true to avoid LazyInitializationException)
spring.jpa.open-in-view=true

# SQL Init — only run data.sql (skip schema.sql; Hibernate handles DDL via ddl-auto=update)
spring.sql.init.mode=always
spring.sql.init.schema-locations=
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.file.name=application.log
logging.level.org.springframework.web=INFO
logging.level.com.rev.app=DEBUG
# Suppress favicon 404 noise
logging.level.org.springframework.web.servlet.resource.NoResourceFoundException=ERROR
server.error.include-message=always
server.error.include-stacktrace=always

# File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
# JWT Configuration
